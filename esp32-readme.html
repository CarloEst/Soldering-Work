<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ESP32 – README</title>

  <!-- GitHub-style Markdown CSS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.1.0/github-markdown-light.min.css" integrity="sha512-yqzI+g6lUAAEXIZpBFV9TS1afxiulv7w7Yiqfsb+VavcXWtvEqmA12J3ySCEUMFaKRqU1sffqHVO9HjRdBOiIw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

  <style>
    body {
      margin: 0;
      padding: 20px;
      background: #f6f8fa;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .page {
      max-width: 900px;
      margin: 0 auto;
    }
    .markdown-body {
      box-sizing: border-box;
      min-width: 200px;
      max-width: 100%;
      margin: 0 auto;
      padding: 24px;
      background: #ffffff;
      border-radius: 8px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.04);
    }
    .markdown-body img {
      max-width: 480px;
      width: 100%;
      height: auto;
      display: block;
      border-radius: 6px;
      margin: 12px 0;
    }

    @media (max-width: 600px) {
      .markdown-body {
        padding: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <article id="content" class="markdown-body">
      <p><em>Loading README…</em></p>
    </article>
  </div>

  <!-- Simple Markdown renderer -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    fetch('ESP32-README.md')
      .then(function (res) { return res.text(); })
      .then(function (md) {
        document.getElementById('content').innerHTML = marked.parse(md);
      })
      .catch(function (err) {
        document.getElementById('content').innerHTML =
          '<p><strong>Failed to load README.</strong></p><pre>' + String(err) + '</pre>';
      });
  </script>
</body>
</html>
